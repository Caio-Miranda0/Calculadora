<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Calculadora</title>
	<meta name="description" content="Uma calculadora simples que realiza as quatro operações básicas. Projeto desenvolvido para praticar lógica de programação em JS.">
	<meta name="author" content="Caio Miranda">
	<link rel="stylesheet" type="text/css" href="estilo.css">
</head>
<body>
	<main class="calculadora">
		<div class="tela" id="tela"><p>CALCULATOR</p></div>
		<div class="botoes-calculadora">
			<button id="limpar-tela">CE</button>
			<button id="limpar-calculo">C</button>
			<button id="apagar-digitado"><<</button>
			<button id="operacao-buttonidir">/</button>

			<button id="algarismo-7">7</button>
			<button id="algarismo-8">8</button>
			<button id="algarismo-9">9</button>
			<button id="operacao-multiplicar">x</button>

			<button id="algarismo-4">4</button>
			<button id="algarismo-5">5</button>
			<button id="algarismo-6">6</button>
			<button id="operacao-subtrair">-</button>

			<button id="algarismo-1">1</button>
			<button id="algarismo-2">2</button>
			<button id="algarismo-3">3</button>
			<button id="operacao-adicionar">+</button>

			<button id="sinal-numero">+-</button>
			<button id="algarismo-0">0</button>
			<button id="numero-decimal">.</button>
			<button id="resultado-calculo">=</button>
		</div>
		<div class="rodape">Created by Caio Miranda</div>
	</main>
</body>
</html>
